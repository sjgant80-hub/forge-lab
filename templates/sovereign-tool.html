<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>__TOOL_NAME__ · sovereign</title>

<style>
:root{
  --bg:__BRAND_BG__;
  --surface:__BRAND_SURFACE__;
  --s2:__BRAND_S2__;
  --border:__BRAND_BORDER__;
  --text:__BRAND_TEXT__;
  --dim:__BRAND_DIM__;
  --bright:__BRAND_BRIGHT__;
  --primary:__BRAND_PRIMARY__;
  --accent:__BRAND_ACCENT__;
  --warn:#c87e3a;
  --fail:#c84a4a;
  --ok:#3a9a72;
  --ring:rgba(255,255,255,.06);
  --r0:#660044; --r1:#cc3366; --r2:#cc6600; --r3:#cccc00; --r4:#66cc00; --r5:#0066cc; --r6:#6600cc;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Syne',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}
code,pre,.mono{font-family:'DM Mono',ui-monospace,monospace}
.app{display:grid;grid-template-rows:auto 1fr auto;min-height:100vh}
header.top{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--surface)}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.02em}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 3px rgba(255,255,255,.04)}
.brand .name{font-size:17px;color:var(--bright)}
.brand .sub{font-size:11px;color:var(--dim);letter-spacing:.18em;text-transform:uppercase}
nav.tabs{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
nav.tabs button{background:transparent;border:1px solid transparent;color:var(--dim);font:inherit;font-size:13px;padding:7px 12px;border-radius:8px;cursor:pointer;letter-spacing:.02em}
nav.tabs button:hover{color:var(--bright);background:var(--s2)}
nav.tabs button.active{color:var(--bright);background:var(--s2);border-color:var(--border)}
.right-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.mesh-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
.mesh-dot.off{background:var(--dim);box-shadow:none}
main{padding:24px;display:flex;flex-direction:column;gap:18px;overflow-y:auto}
.view{display:none}
.view.active{display:flex;flex-direction:column;gap:18px}
.view h2{font-size:20px;color:var(--bright);font-weight:600;letter-spacing:.01em}
.view .lead{color:var(--dim);font-size:14px;max-width:680px;line-height:1.6}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.card h3{font-size:14px;color:var(--bright);margin-bottom:6px;font-weight:600;letter-spacing:.01em}
.card .meta{font-size:11px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.card .body{font-size:13px;color:var(--text);line-height:1.55}
.btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:9px 16px;font:inherit;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:.02em}
.btn:hover{filter:brightness(1.1)}
.btn.secondary{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--border)}
.btn.small{padding:6px 11px;font-size:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase}
.field input,.field select,.field textarea{background:var(--s2);border:1px solid var(--border);color:var(--bright);font:inherit;padding:10px 12px;border-radius:8px;font-size:14px}
.field textarea{min-height:90px;resize:vertical;font-family:'DM Mono',monospace;font-size:13px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary)}
table{width:100%;border-collapse:collapse;font-size:13px}
table th{text-align:left;padding:10px 12px;color:var(--dim);font-size:11px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border)}
table td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--text)}
table tr:hover td{background:var(--s2)}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;background:var(--s2);color:var(--dim);letter-spacing:.04em}
.pill.ok{background:rgba(58,154,114,.15);color:var(--ok)}
.pill.warn{background:rgba(200,126,58,.15);color:var(--warn)}
.pill.fail{background:rgba(200,74,74,.15);color:var(--fail)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 22px;text-align:center;color:var(--dim)}
.empty .glyph{font-size:36px;margin-bottom:10px;opacity:.4}
.empty h3{font-size:15px;color:var(--bright);margin-bottom:5px}
.empty p{font-size:13px;max-width:380px;line-height:1.55}
.split{display:grid;grid-template-columns:280px 1fr;gap:18px}
.lifecycle{display:flex;gap:14px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow-x:auto}
.life-step{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:74px;cursor:pointer;padding:6px}
.life-step .glyph{font-size:18px;color:var(--dim);transition:color .2s}
.life-step .label{font-size:10px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
.life-step.done .glyph{color:var(--ok)}
.life-step.active .glyph{color:var(--primary);text-shadow:0 0 12px var(--primary)}
.life-step.active .label{color:var(--bright)}
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--border);color:var(--bright);padding:11px 16px;border-radius:8px;font-size:13px;opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-color:var(--ok)}
.toast.warn{border-color:var(--warn)}
.toast.fail{border-color:var(--fail)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;z-index:50;padding:18px}
.modal.show{display:flex}
.modal-body{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto}
.modal h3{font-size:16px;color:var(--bright);margin-bottom:12px}
footer.bottom{padding:11px 22px;border-top:1px solid var(--border);background:var(--surface);font-size:11px;color:var(--dim);display:flex;justify-content:space-between;align-items:center;letter-spacing:.06em;text-transform:uppercase;flex-wrap:wrap;gap:10px}
footer.bottom a{color:var(--dim);text-decoration:none}
footer.bottom a:hover{color:var(--bright)}
@media (max-width:680px){
  .split{grid-template-columns:1fr}
  nav.tabs{gap:2px}
  nav.tabs button{padding:6px 9px;font-size:12px}
  main{padding:16px}
}

<script>
// ═══════════════════════════════════════════════════════════
// __TOOL_NAME__ · sovereign · prime __TOOL_PRIME__
// FORGED FROM YOUR WORKFLOW DESCRIPTION
// 7 layers · 8+1 agents · zero servers · your data, your device
// ═══════════════════════════════════════════════════════════

// ── L0 IDENTITY ──────────────────────────────────────
const NODE = {
  id: '__TOOL_ID__',
  name: '__TOOL_NAME__',
  prime: __TOOL_PRIME__,
  domain: '__TOOL_DOMAIN__',
  built: '__TOOL_BUILT__',
  forgeId: '__TOOL_FORGE_ID__'
};
window.NODE = NODE;

// ── L5 PERSIST · IndexedDB + localStorage ────────────
const DB_KEY = NODE.id + '_db_v1';
let DB = {
  records: [],      // primary data store
  log: [],          // audit/event log
  settings: { mesh_auto: true, ai_provider: 'anthropic' },
  licence: null,    // signed Konomi licence envelope (base64)
  meta: { created: Date.now(), forged: NODE.built }
};
function load() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) DB = Object.assign(DB, JSON.parse(raw));
  } catch (e) { console.warn('load failed', e); }
}
function save() {
  try { localStorage.setItem(DB_KEY, JSON.stringify(DB)); } catch (e) {}
}
function logEvent(type, data) {
  DB.log.unshift({ t: Date.now(), type, data });
  if (DB.log.length > 1000) DB.log.length = 1000;
  save();
}
load();

// ── ◊·κ KONOMI LICENCE · Ed25519 verification ────────
const KONOMI = {
  pubkey_b64: '__INJECT_KONOMI_PUBKEY__',
  trial_envelope: '__INJECT_TRIAL_LICENCE__',  // pre-signed at forge time
  tier: 'dead',      // dead | trial | pro | business | enterprise
  features: [],
  payload: null,
  expires_at: null
};

function base64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function canonicalJSON(obj) {
  if (obj === null || typeof obj !== 'object') return JSON.stringify(obj);
  if (Array.isArray(obj)) return '[' + obj.map(canonicalJSON).join(',') + ']';
  const keys = Object.keys(obj).sort();
  return '{' + keys.map(k => JSON.stringify(k) + ':' + canonicalJSON(obj[k])).join(',') + '}';
}

async function verifyLicence(envelopeB64) {
  if (!envelopeB64) return { ok: false, error: 'no envelope' };
  if (!window.crypto?.subtle) return { ok: false, error: 'WebCrypto unavailable' };
  try {
    const raw = atob(envelopeB64);
    const { payload, sig } = JSON.parse(raw);
    // Bind to this tool — reject licences for other tools
    if (payload.tool_id && payload.tool_id !== NODE.id) {
      return { ok: false, error: 'licence is for ' + payload.tool_id + ', not ' + NODE.id };
    }
    if (payload.forge_id && payload.forge_id !== NODE.forgeId) {
      // Soft-fail: allow if forge_id differs but tool_id matches (admin licence)
    }
    if (payload.expires && new Date(payload.expires) < new Date()) {
      return { ok: false, error: 'licence expired ' + payload.expires };
    }
    const pubRaw = base64ToBytes(KONOMI.pubkey_b64);
    const key = await crypto.subtle.importKey(
      'raw', pubRaw, { name: 'Ed25519' }, false, ['verify']
    );
    const sigBytes = base64ToBytes(sig);
    const msg = new TextEncoder().encode(canonicalJSON(payload));
    const ok = await crypto.subtle.verify({ name: 'Ed25519' }, key, sigBytes, msg);
    if (!ok) return { ok: false, error: 'signature invalid' };
    return { ok: true, payload };
  } catch (e) { return { ok: false, error: e.message }; }
}

async function activateLicence(envelopeB64) {
  const v = await verifyLicence(envelopeB64);
  if (!v.ok) {
    if (typeof toast === 'function') toast('licence rejected: ' + v.error, 'fail');
    return v;
  }
  DB.licence = envelopeB64;
  KONOMI.tier = v.payload.tier;
  KONOMI.features = v.payload.features || [];
  KONOMI.payload = v.payload;
  KONOMI.expires_at = v.payload.expires;
  save();
  if (typeof toast === 'function') toast('◊ ' + v.payload.tier + ' tier activated', 'ok');
  updateLicenceUI();
  return v;
}

function hasFeature(name) {
  return KONOMI.features.includes(name);
}

function isDead() {
  return KONOMI.tier === 'dead';
}

// Async boot: try saved licence first, fall back to baked-in trial
(async function bootLicence() {
  if (DB.licence) {
    const v = await verifyLicence(DB.licence);
    if (v.ok) {
      KONOMI.tier = v.payload.tier;
      KONOMI.features = v.payload.features || [];
      KONOMI.payload = v.payload;
      KONOMI.expires_at = v.payload.expires;
      console.log('%c◊·κ', 'color:#c2a060;font-weight:bold', 'licence ' + KONOMI.tier + ' loaded · expires ' + (KONOMI.expires_at || 'never'));
      return;
    }
  }
  // Saved licence missing or invalid — try the baked trial
  if (KONOMI.trial_envelope && KONOMI.trial_envelope.length > 50) {
    const v = await verifyLicence(KONOMI.trial_envelope);
    if (v.ok) {
      DB.licence = KONOMI.trial_envelope;
      KONOMI.tier = v.payload.tier;
      KONOMI.features = v.payload.features || [];
      KONOMI.payload = v.payload;
      KONOMI.expires_at = v.payload.expires;
      save();
      console.log('%c◊·κ', 'color:#c2a060;font-weight:bold', '30-day trial activated · expires ' + KONOMI.expires_at);
      return;
    }
  }
  console.log('%c◊', 'color:#8a8a8a;font-weight:bold', 'DEAD mode · paste a licence to activate');
})();

function updateLicenceUI() {
  const el = document.getElementById('licence-state');
  if (!el) return;
  const tier = KONOMI.tier;
  const colour = tier === 'dead' ? '#8a8a8a' : tier === 'trial' ? '#c2a060' : '#3a9a72';
  el.innerHTML = '<span style="color:' + colour + ';font-weight:600">' + tier.toUpperCase() + '</span>';
  if (KONOMI.expires_at) {
    const d = new Date(KONOMI.expires_at);
    el.innerHTML += ' · <span style="opacity:.7">' + d.toLocaleDateString() + '</span>';
  }
}

function showLicenceDialog() {
  const current = KONOMI.payload ? JSON.stringify(KONOMI.payload, null, 2) : '(no licence active — DEAD mode)';
  const tier = KONOMI.tier;
  showModal(`
    <h3>◊·κ Konomi Licence</h3>
    <div style="margin:10px 0;padding:10px;background:var(--s2);border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;white-space:pre-wrap">${esc(current)}</div>
    <p style="font-size:13px;color:var(--dim);margin:10px 0">Paste a signed licence envelope to activate Pro / Business / Enterprise tier:</p>
    <textarea id="licence-paste" placeholder="paste licence envelope (base64) here…" style="width:100%;min-height:90px;background:var(--s2);border:1px solid var(--border);color:var(--bright);padding:10px;border-radius:6px;font-family:'DM Mono',monospace;font-size:12px"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button class="btn" onclick="activateLicence(document.getElementById('licence-paste').value.trim()).then(v=>{if(v.ok)closeModal();})">activate</button>
      <button class="btn ghost" onclick="closeModal()">close</button>
      <span style="margin-left:auto;font-size:11px;color:var(--dim);align-self:center">tier: ${esc(tier)}</span>
    </div>
  `);
}

// DEAD-mode cap on records (skips check if pro+)
const DEAD_RECORD_CAP = 50;
function deadCheck() {
  if (!isDead() && !hasFeature('core')) return false;
  if (hasFeature('unlimited_records')) return false;
  if (DB.records.length >= DEAD_RECORD_CAP) {
    if (typeof toast === 'function') toast('DEAD-mode cap: ' + DEAD_RECORD_CAP + ' records. Activate a licence to lift it.', 'warn');
    showLicenceDialog();
    return true;
  }
  return false;
}

// ── L2 SWARM · agent system prompts ─────────────────
__INJECT_AGENTS__

// ── L4 BLOOM · route intent to highest-ring agent ──
function bloomRoute(intent) {
  const text = (intent || '').toLowerCase();
  const scores = {};
  for (const [id, agent] of Object.entries(AGENTS)) {
    let s = 0;
    for (const kw of (agent.triggers || [])) {
      if (text.includes(kw)) s += 1;
    }
    scores[id] = s;
  }
  const best = Object.entries(scores).sort((a, b) => b[1] - a[1])[0];
  return best && best[1] > 0 ? best[0] : 'omega';
}

// ── L3 CASCADE · T0 offline · T1 local · T2 mesh · T3 API ─
async function cascade(action, payload) {
  // T0: always-works offline path
  const t0 = T0_HANDLERS[action];
  if (t0) {
    try { return { tier: 'T0', result: t0(payload) }; } catch (e) {}
  }
  // T1: local AI via web API key (if user has one)
  if (DB.settings.api_key) {
    try {
      const r = await llmCall(action, payload);
      return { tier: 'T1', result: r };
    } catch (e) { console.warn('T1 failed', e); }
  }
  // T2: mesh — try a peer
  if (DB.settings.mesh_auto && meshChannel) {
    try {
      const r = await meshRequest(action, payload);
      if (r) return { tier: 'T2', result: r };
    } catch (e) {}
  }
  return { tier: 'T0', result: { error: 'no path available', action } };
}
const T0_HANDLERS = {
  'echo': (p) => ({ echoed: p, at: Date.now() }),
  'count': () => ({ records: DB.records.length, log: DB.log.length }),
  __INJECT_T0_HANDLERS__
};
async function llmCall(action, payload) {
  if (!DB.settings.api_key) throw new Error('no api key');
  const provider = DB.settings.ai_provider || 'anthropic';
  // anthropic only for sovereign-tool MVP
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': DB.settings.api_key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2048,
      system: AGENTS[bloomRoute(action)].sys,
      messages: [{ role: 'user', content: JSON.stringify({ action, payload, db_summary: { records: DB.records.length } }) }]
    })
  });
  if (!r.ok) throw new Error('llm ' + r.status);
  const j = await r.json();
  return { text: j.content[0].text };
}
async function meshRequest(action, payload) {
  return new Promise((resolve) => {
    const id = 'req_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    const handler = (e) => {
      const m = e.data;
      if (m && m.type === 'response:' + action && m.req === id) {
        meshChannel.removeEventListener('message', handler);
        resolve(m.payload);
      }
    };
    meshChannel.addEventListener('message', handler);
    meshPost('request:' + action, { payload, req: id });
    setTimeout(() => { meshChannel.removeEventListener('message', handler); resolve(null); }, 2500);
  });
}

// ── L1 FACE · view switching ─────────────────────────
function setView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.dataset.view === name));
  document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  logEvent('view:set', { name });
}

// ── L7 ASS · lifecycle ───────────────────────────────
const ASS = ['●', '〜', '┃', '♡', '△', '◐', '◯'];
const ASS_LABELS = __INJECT_ASS_LABELS__;
function lifecycle(state) {
  const i = ASS_LABELS.findIndex(l => l.state === state);
  if (i < 0) return;
  const el = document.getElementById('lifecycle');
  if (!el) return;
  el.innerHTML = ASS_LABELS.map((l, idx) => `
    <div class="life-step ${idx < i ? 'done' : ''} ${idx === i ? 'active' : ''}" data-state="${l.state}">
      <div class="glyph">${ASS[idx]}</div>
      <div class="label">${l.label}</div>
    </div>
  `).join('');
}

// ── L6 SKIN · helpers ────────────────────────────────
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, kind) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (kind || '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { el.className = 'toast'; }, 3000);
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function showModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}
function download(name, content, type) {
  const blob = new Blob([content], { type: type || 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── ◊·κ FALLMESH SHIM — same-origin handshake ───────
let meshChannel = null;
function meshPost(type, data) {
  if (!meshChannel) return;
  try {
    meshChannel.postMessage(Object.assign(
      { type, from: NODE.id, prime: NODE.prime, name: NODE.name, t: Date.now() },
      data || {}
    ));
  } catch (e) {}
}
(function meshBoot() {
  const meshEl = document.getElementById('mesh-state');
  if (typeof BroadcastChannel === 'undefined') {
    if (meshEl) meshEl.classList.add('off');
    return;
  }
  try { meshChannel = new BroadcastChannel('fallmesh'); }
  catch (e) { if (meshEl) meshEl.classList.add('off'); return; }
  window.fallmesh = {
    post: meshPost,
    emit: (data) => meshPost(NODE.id + ':event', data),
    request: (type, payload) => meshPost('request:' + type, { payload })
  };
  meshChannel.onmessage = (e) => {
    const m = e.data;
    if (!m || m.from === NODE.id) return;
    if (m.type === 'mesh:ping') {
      meshPost('mesh:pong', { url: location.origin + location.pathname, title: NODE.name, layers: 7 });
      return;
    }
    __INJECT_MESH_INBOUND__
  };
  meshPost('node:online', { url: location.origin + location.pathname, layers: 7 });
  try { console.log('%c◊·κ=1', 'color:#10b981;font-weight:bold;font-size:13px', NODE.name + ' · prime ' + NODE.prime + ' · mesh online'); } catch (_) {}
})();

// ── ◊·κ KCC LEDGER · proof of contribution · Ω(KCC) ──
// ring map: R0 compute · R1 signal · R2 filter · R3 care · R4 build · R5 verify · R6 govern
(function kccShim(){
  if (!window.NODE) return;
  var KCC_KEY = 'kcc_ledger_' + NODE.id + '_v1';
  var RINGS = [
    { v:'R0', label:'compute',  colour:'#660044' },
    { v:'R1', label:'signal',   colour:'#cc3366' },
    { v:'R2', label:'filter',   colour:'#cc6600' },
    { v:'R3', label:'care',     colour:'#cccc00' },
    { v:'R4', label:'build',    colour:'#66cc00' },
    { v:'R5', label:'verify',   colour:'#0066cc' },
    { v:'R6', label:'govern',   colour:'#6600cc' }
  ];
  var LEDGER = { events:[], head:null };
  try { var raw = localStorage.getItem(KCC_KEY); if (raw) LEDGER = Object.assign(LEDGER, JSON.parse(raw)); } catch(_){}
  function persist(){ try { localStorage.setItem(KCC_KEY, JSON.stringify(LEDGER)); } catch(_){} }
  function fnv1a(s){ var h=2166136261>>>0; for (var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=(h+((h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24)))>>>0;} return ('00000000'+h.toString(16)).slice(-8);}
  function emit(action, ring, weight, meta){
    if (typeof ring !== 'number' || ring < 0 || ring > 6) ring = 0;
    var ev = { v:1, tool:NODE.id, tool_prime:NODE.prime, action:String(action||'event'), ring:ring, weight:typeof weight==='number'?weight:1, t:Date.now(), prev:LEDGER.head||null, meta:meta||null };
    ev.h = fnv1a(JSON.stringify(ev) + (LEDGER.head || ''));
    LEDGER.events.push(ev); LEDGER.head = ev.h; persist();
    if (window.kccChannel) try { window.kccChannel.postMessage({ type:'kcc:event', from:NODE.id, ev:ev }); } catch(_){}
    updateBadge();
    return ev;
  }
  function bloom(){ var b=[0,0,0,0,0,0,0]; LEDGER.events.forEach(function(ev){ b[ev.ring]=(b[ev.ring]||0)+(ev.weight||1); }); return b; }
  function exportProof(){
    return { v:1, tool:NODE.id, tool_prime:NODE.prime, tool_name:NODE.name, issued:new Date().toISOString(), event_count:LEDGER.events.length, head:LEDGER.head, bloom:bloom(), events:LEDGER.events };
  }
  var bloomBadge = null;
  function injectBadge(){
    if (document.getElementById('kcc-badge')) return;
    var el = document.createElement('div');
    el.id = 'kcc-badge';
    el.style.cssText='position:fixed;bottom:12px;left:120px;background:rgba(0,0,0,.65);color:#dbe1ea;padding:5px 10px;border-radius:6px;font-family:monospace;font-size:11px;cursor:pointer;z-index:9999;letter-spacing:.06em;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(6px)';
    el.title = 'Konomi Cube Coin · ledger';
    el.onclick = showLedger;
    document.body.appendChild(el);
    bloomBadge = el;
    updateBadge();
  }
  function updateBadge(){
    if (!bloomBadge) return;
    var b = bloom();
    var sum = b.reduce(function(a,x){return a+x;}, 0);
    var sparks = b.map(function(v, i){ var sz=Math.min(11, 2+Math.round(v/2)); return '<span style="display:inline-block;width:3px;height:'+sz+'px;background:'+RINGS[i].colour+';margin:0 1px;border-radius:1px;vertical-align:middle"></span>'; }).join('');
    bloomBadge.innerHTML = '<span style="opacity:.7">KCC</span> '+sparks+' <span style="opacity:.85">'+sum+'</span>';
  }
  function showLedger(){
    var b = bloom();
    var sum = b.reduce(function(a,x){return a+x;}, 0);
    var rows = RINGS.map(function(r, i){
      var pct = sum ? Math.round(b[i]/sum*100) : 0;
      return '<tr><td style="color:'+r.colour+';padding:4px 0">'+r.v+'</td><td>'+r.label+'</td><td style="text-align:right;font-weight:700">'+b[i]+'</td><td style="color:#8a8a8a">'+pct+'%</td></tr>';
    }).join('');
    var recent = LEDGER.events.slice(-8).reverse().map(function(ev){
      return '<div style="font-size:11px;color:#a8b0bc;padding:2px 0">'+new Date(ev.t).toLocaleString()+' · <span style="color:'+RINGS[ev.ring].colour+'">'+RINGS[ev.ring].v+'</span> · '+ev.action+(ev.weight!==1?' ×'+ev.weight:'')+'</div>';
    }).join('') || '<div style="color:#8a8a8a;font-size:12px">no events</div>';
    var m=document.createElement('div');
    m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px';
    m.innerHTML='<div style="background:#161821;border:1px solid #2a2f3a;border-radius:12px;padding:24px;max-width:560px;width:100%;color:#dbe1ea;max-height:88vh;overflow:auto;font-family:system-ui,sans-serif"><h3 style="margin:0 0 4px">◊·κ KCC Ledger</h3><p style="margin:0 0 12px;font-size:12px;color:#8a8a8a">'+NODE.name+' · prime '+NODE.prime+' · '+sum+' events</p><table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px"><thead><tr style="border-bottom:1px solid #2a2f3a"><th style="text-align:left;padding:4px 0">ring</th><th style="text-align:left">earn by</th><th style="text-align:right">count</th><th>%</th></tr></thead><tbody>'+rows+'</tbody></table>'+recent+'<div style="display:flex;gap:8px;margin-top:14px"><button id="kcc-export" style="background:#5b8def;color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer">export proof</button><button id="kcc-close" style="background:transparent;color:#8a8a8a;border:1px solid #2a2f3a;padding:8px 14px;border-radius:6px;cursor:pointer">close</button></div></div>';
    document.body.appendChild(m);
    m.querySelector('#kcc-close').onclick = function(){ m.remove(); };
    m.querySelector('#kcc-export').onclick = function(){
      var p = exportProof();
      var blob = new Blob([JSON.stringify(p, null, 2)], { type:'application/json' });
      var u = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href=u; a.download=NODE.id+'-kcc-proof-'+Date.now()+'.json'; a.click();
      setTimeout(function(){ URL.revokeObjectURL(u); }, 1000);
    };
    m.onclick = function(e){ if (e.target===m) m.remove(); };
  }
  try { window.kccChannel = new BroadcastChannel('fall-kcc'); } catch(_){}
  window.kcc = { emit:emit, bloom:bloom, exportProof:exportProof, rings:RINGS, showLedger:showLedger };
  (async function(){
    if (document.readyState === 'loading') await new Promise(function(r){ document.addEventListener('DOMContentLoaded', r, { once:true }); });
    injectBadge();
    var todayKey = 'kcc_open_' + new Date().toISOString().slice(0,10);
    if (!sessionStorage.getItem(todayKey)) { sessionStorage.setItem(todayKey, '1'); emit('app:open', 0, 1); }
    try { console.log('%c◊·κ KCC', 'color:#c2a060;font-weight:bold', NODE.name + ' · ' + LEDGER.events.length + ' events'); } catch(_){}
  })();
})();
